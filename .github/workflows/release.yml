name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release:
        description: Force a release (bypasses PR label check)
        type: boolean
        default: false

jobs:
  release:
    uses: photon-hq/buildspace/.github/workflows/typescript-service-release.yaml@main
    permissions:
      contents: write
      pull-requests: read
      id-token: write
    with:
      service-name: n8n-nodes-spectrum
      build-command: "npm run lint && npm run build"
      publish-command: "bash scripts/ci-publish.sh"
      release: ${{ github.event_name == 'workflow_dispatch' && inputs.release || false }}
    secrets: inherit
